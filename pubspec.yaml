name: photo_id
description: "Tạo ảnh thẻ chuẩn quốc tế từ selfie"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # Network
  http: ^1.2.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ML - Face Detection
  google_mlkit_face_detection: ^0.11.0

  # ML - Background Removal
  tflite_flutter: ^0.10.0

  # Camera
  camera: ^0.11.0+1
  image_picker: ^1.0.7

  # Image Processing
  image: ^4.1.7

  # File System
  path_provider: ^2.1.2
  path: ^1.9.0

  # Platform Integration
  share_plus: ^9.0.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5

  # Subscription
  purchases_flutter: ^6.27.0

  # Analytics & Crash
  firebase_core: ^2.32.0
  firebase_analytics: ^10.10.0
  firebase_crashlytics: ^3.5.0
  firebase_remote_config: ^4.4.0

  # Ads
  google_mobile_ads: ^5.1.0

  # UI
  flutter_svg: ^2.0.10+1

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  
  # Security
  local_auth: ^2.1.0
  encrypt: ^5.0.1
  flutter_secure_storage: ^9.0.0

  # PDF
  pdf: ^3.10.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

  # Testing
  mocktail: ^1.0.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/countries/
    - assets/images/
    - assets/icons/
    - assets/outfits/
